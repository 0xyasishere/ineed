name: Run DB Migration
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Test connection & run schema
        env:
          PGPASSWORD: Apx600ii@#$
        run: |
          echo "=== Trying direct connection (IPv6) ==="
          psql "postgresql://postgres:${PGPASSWORD}@db.qndgoocyprcrqmodmjcm.supabase.co:5432/postgres?sslmode=require&connect_timeout=10" -c "SELECT 1 as test;" && echo "DIRECT OK" && \
          psql "postgresql://postgres:${PGPASSWORD}@db.qndgoocyprcrqmodmjcm.supabase.co:5432/postgres?sslmode=require&connect_timeout=10" -f supabase/schema.sql && echo "SCHEMA APPLIED" || \
          echo "Direct failed, trying pooler..." && \
          psql "postgresql://postgres.qndgoocyprcrqmodmjcm:${PGPASSWORD}@aws-0-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require&connect_timeout=10" -c "SELECT 1 as test;" && echo "POOLER OK" && \
          psql "postgresql://postgres.qndgoocyprcrqmodmjcm:${PGPASSWORD}@aws-0-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require&connect_timeout=10" -f supabase/schema.sql && echo "SCHEMA APPLIED" || \
          echo "ALL CONNECTIONS FAILED"
